<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — StepShield</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-side">
    <a href="index.html" class="brand" style="color:white;">
      <svg class="brand-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 3L34 8V19C34 28 28 34.5 20 37C12 34.5 6 28 6 19V8L20 3Z" fill="#FF5347"/>
        <path d="M20 3L34 8V19C34 28 28 34.5 20 37V3Z" fill="#FF8A80"/>
        <circle cx="20" cy="19" r="6.5" stroke="white" stroke-width="2"/>
      </svg>
      StepShield
    </a>
    <div class="quote">"Every route has a safer version. <span>StepShield finds it before you take a step.</span>"</div>
    <div style="position:relative; z-index:1; font-size:13px; color:rgba(255,255,255,.5);">© 2026 StepShield</div>
  </div>

  <div class="auth-main">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to analyze your next route.</p>

      <form id="loginForm" novalidate>
        <div class="field" id="field-login-email">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
          <div class="field-error">Enter a valid email.</div>
        </div>
        <div class="field" id="field-login-password">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
          <div class="field-error">Incorrect password.</div>
        </div>
        <div class="field-row">
          <label class="checkbox-row"><input type="checkbox" id="rememberMe"> Remember me</label>
          <a href="#" class="link-red" onclick="showToast('Password reset is a UI preview in this prototype.'); return false;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:26px;">Log In</button>
      </form>

      <div class="divider">or continue with</div>
      <button class="google-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.3 2.7l6-6C33.9 6.4 29.2 4.5 24 4.5 12.9 4.5 4 13.4 4 24.5S12.9 44.5 24 44.5c11.1 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c2.8 0 5.3 1 7.3 2.7l6-6C33.9 6.4 29.2 4.5 24 4.5c-7.4 0-13.7 4.1-17 10.2z"/><path fill="#4CAF50" d="M24 44.5c5.2 0 9.9-1.7 13.6-4.7l-6.3-5.2C29.3 36.4 26.8 37 24 37c-5.3 0-9.7-3.4-11.3-8.1l-6.5 5C9.4 40.3 16.1 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.3 5.2C40.5 36 44 30.9 44 24.5c0-1.3-.1-2.7-.4-4z"/></svg>
        Sign in with Google
      </button>

      <p class="auth-foot">Don't have an account? <a href="signup.html" class="link-red">Sign up</a></p>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
